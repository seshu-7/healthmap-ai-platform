server:
  port: 8081

spring:
  application:
    name: healthmap-patient-service

  datasource:
    url: jdbc:h2:mem:healthmapdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  sql:
    init:
      mode: always

app:
  jwt:
    secret: ${JWT_SECRET:healthmap-dev-secret-change-in-production-must-be-32-chars}
    expiration-ms: 28800000  # 8 hours

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.healthmap: DEBUG
    org.springframework.security: INFO
